<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form Validation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Contact Us</h1>
    <form id="contactForm" novalidate>
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="e.g., John Doe">
        <small class="error-message" id="nameError"></small>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="e.g., john.doe@example.com">
        <small class="error-message" id="emailError"></small>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Write your message"></textarea>
        <small class="error-message" id="messageError"></small>
      </div>

      <button type="submit">Send Message</button>
      <p id="successMessage" class="success-message"></p>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
